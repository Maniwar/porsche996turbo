name: Smoke Inquiry (diagnostic)

# One-shot, manual diagnostic: submits a real make-an-offer inquiry to the live
# function from the runner (the sandbox can't reach supabase.co), then reads back
# concierge_inquiries and email_log so we can see EXACTLY what happened — whether
# the row saved, whether the notification email was attempted, and Resend's result.
on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - name: Read endpoint + anon key from the page
        id: cfg
        run: |
          BASE=$(grep -oE 'https://[a-z0-9]+\.supabase\.co/functions/v1/concierge' index.html | head -1)
          KEY=$(grep -oiE "anonKey:[[:space:]]*'[^']+'" index.html | head -1 | sed -E "s/.*'([^']+)'.*/\1/")
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "key_len=${#KEY}"
          echo "::add-mask::$KEY"
          echo "key=$KEY" >> "$GITHUB_OUTPUT"

      - name: Submit a real make-an-offer inquiry
        env:
          BASE: ${{ steps.cfg.outputs.base }}
          KEY: ${{ steps.cfg.outputs.key }}
        run: |
          SK="ci-smoke-$(date +%s)"
          echo "session_key = $SK"
          cat > payload.json <<JSON
          {"form":"make-an-offer","serial":null,"values":{"kind":"offer","name":"CI Smoke","email":"ci-smoke@example.com","phone":"","amount":"55000","message":"Automated diagnostic — ignore"},"session_key":"$SK","section":"hero","turns":2}
          JSON
          code=$(curl -sS -o resp.json -w '%{http_code}' --max-time 60 \
            -X POST "$BASE?form=1" \
            -H "Origin: https://maniwar.github.io/porsche996turbo/" \
            -H "Content-Type: application/json" \
            -H "apikey: $KEY" -H "Authorization: Bearer $KEY" \
            --data @payload.json || echo 000)
          echo "HTTP $code"
          echo "----- response body -----"
          cat resp.json; echo
          echo "SK=$SK" >> "$GITHUB_ENV"

      - name: Read back what the DB recorded
        run: |
          echo "===== latest concierge_inquiries (did the row save?) ====="
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -c \
            "select created_at, kind, name, email, amount, status, session_key from public.concierge_inquiries order by created_at desc limit 3;"
          echo "===== latest email_log (did the notification send? Resend result?) ====="
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -c \
            "select created_at, to_email, kind, ok, coalesce(error,'(none)') as error, coalesce(provider_id,'(none)') as provider_id from public.email_log order by created_at desc limit 3;"
          echo "===== the inquiry_notify_email destination in config ====="
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -c \
            "select value from public.concierge_config where key='inquiry_notify_email';"
