name: Hero Kling Orbit (fal)

# Generates a NEW high-res hero orbit by feeding one clean high-res still of the
# real car to Kling image-to-video with an orbit camera instruction, then extracts
# 81 evenly-spaced frames at 1920x1080. Kling is a video model, so it keeps the car
# temporally consistent as the camera circles (unlike per-angle image models that
# invent a different car each frame). Runs on a GitHub runner, which can reach fal.
on:
  workflow_dispatch:
    inputs:
      image:       { description: 'Source still in repo', default: '20250621_173938(1).jpg' }
      model:       { description: 'fal Kling model id', default: 'fal-ai/kling-video/v2.1/pro/image-to-video' }
      duration:    { description: 'Video seconds (5 or 10)', default: '5' }
      frames:      { description: 'Frames to extract', default: '81' }
      prompt:      { description: 'Camera/scene prompt', default: 'Smooth cinematic camera orbit slowly circling a stationary red Porsche 911 parked in a lot. The camera revolves around the car at a fixed height to reveal its side and front three-quarter. The car stays perfectly still and keeps its exact shape. Consistent daylight, realistic paint reflections, luxury automotive commercial, steady smooth motion.' }
      negative:    { description: 'Negative prompt', default: 'car driving or moving, wheels spinning, distortion, morphing, warping, shape change, melting, extra wheels, people, extra cars, text, watermark, jerky motion, camera shake' }
      cfg:         { description: 'CFG scale 0..1', default: '0.5' }
      out_branch:  { description: 'Branch to push frames to', default: 'hero/kling-out' }

permissions:
  contents: write

jobs:
  kling:
    runs-on: ubuntu-latest
    env:
      FAL_KEY: ${{ secrets.FAL_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          pip install --quiet pillow
          sudo apt-get -qq update && sudo apt-get -qq install -y ffmpeg jpegoptim imagemagick

      - name: Generate orbit video via Kling
        env:
          IMAGE:    ${{ inputs.image }}
          MODEL:    ${{ inputs.model }}
          DURATION: ${{ inputs.duration }}
          PROMPT:   ${{ inputs.prompt }}
          NEG:      ${{ inputs.negative }}
          CFG:      ${{ inputs.cfg }}
        run: |
          python3 - <<'PY'
          import os, json, time, sys, urllib.request, urllib.parse
          KEY=os.environ["FAL_KEY"]
          if not KEY: sys.exit("FAL_API_KEY secret is empty")
          REPO=os.environ["GITHUB_REPOSITORY"]; SHA=os.environ["GITHUB_SHA"]
          MODEL=os.environ["MODEL"].strip()
          img_url=f"https://raw.githubusercontent.com/{REPO}/{SHA}/"+urllib.parse.quote(os.environ["IMAGE"])
          print("source still:", img_url)
          body={"prompt":os.environ["PROMPT"],"image_url":img_url,
                "duration":os.environ["DURATION"],"aspect_ratio":"16:9",
                "negative_prompt":os.environ["NEG"],"cfg_scale":float(os.environ["CFG"])}
          hdr={"Authorization":f"Key {KEY}","Content-Type":"application/json"}
          def req(url, data=None):
              r=urllib.request.Request(url, data=(json.dumps(data).encode() if data is not None else None),
                                       headers=hdr, method=("POST" if data is not None else "GET"))
              with urllib.request.urlopen(r, timeout=120) as resp: return json.load(resp)
          # submit to the async queue (video gen takes minutes)
          sub=req(f"https://queue.fal.run/{MODEL}", body)
          status_url=sub.get("status_url"); resp_url=sub.get("response_url")
          print("queued:", sub.get("request_id"), flush=True)
          # poll up to ~12 min
          for t in range(144):
              st=req(status_url)
              s=st.get("status")
              if s=="COMPLETED": break
              if s in ("FAILED","ERROR"): sys.exit(f"kling failed: {json.dumps(st)[:400]}")
              if t%6==0: print(f"  ...{s} ({t*5}s)",flush=True)
              time.sleep(5)
          else:
              sys.exit("timed out waiting for kling")
          out=req(resp_url)
          vurl=out["video"]["url"]
          print("video:", vurl, flush=True)
          with urllib.request.urlopen(vurl, timeout=180) as v: open("orbit.mp4","wb").write(v.read())
          print("downloaded", os.path.getsize("orbit.mp4")//1024, "KB")
          PY

      - name: Extract + normalise 81 frames
        env:
          FRAMES: ${{ inputs.frames }}
        run: |
          rm -rf all_frames frames_new && mkdir -p all_frames frames_new
          ffmpeg -v error -i orbit.mp4 -vf "scale=1920:1080:flags=lanczos" -q:v 2 all_frames/f_%04d.jpg
          python3 - <<'PY'
          import glob, os, shutil
          N=int(os.environ["FRAMES"])
          allf=sorted(glob.glob("all_frames/f_*.jpg"))
          if not allf: raise SystemExit("no frames extracted")
          M=len(allf); print(f"extracted {M} raw frames, sampling {N}")
          # evenly sample N frames across the whole clip
          idx=[round(i*(M-1)/(N-1)) for i in range(N)] if N>1 else [0]
          for out_i, src_i in enumerate(idx, start=1):
              shutil.copy(allf[src_i], f"frames_new/frame_{out_i:03d}.jpg")
          print("wrote", len(os.listdir("frames_new")), "frames")
          PY
          jpegoptim -q -m88 --strip-all frames_new/*.jpg
          du -sh frames_new; ls frames_new | wc -l
          # quick 3x3 contact sheet across the orbit
          montage $(ls frames_new/frame_*.jpg | awk 'NR%10==1' | head -9) \
            -tile 3x3 -geometry 400x225+4+4 -background '#120a0a' contact_sheet.jpg || true

      - name: Push frames + video to review branch
        env:
          OUT: ${{ inputs.out_branch }}
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git checkout -B "$OUT"
          rm -rf frames_kling && mv frames_new frames_kling
          cp contact_sheet.jpg frames_kling/_contact_sheet.jpg || true
          cp orbit.mp4 frames_kling/_orbit.mp4 || true
          git add frames_kling
          git commit -m "Kling orbit hero: ${{ inputs.frames }} frames @1920x1080 from ${{ inputs.model }}"
          git push -f origin "$OUT"
          echo "Pushed to $OUT"
