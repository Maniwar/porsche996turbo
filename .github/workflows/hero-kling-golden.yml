name: Hero Kling Golden Turntable (fal)

# Golden-hour hero orbit. Grades the Samsung Frame TV side-profile shot in-runner
# (pulls exposure down, warms + deepens it), publishes it as the orbit source, then
# asks Kling for a LOCKED TURNTABLE (car rotates in place, camera on a tripod) so
# there is minimal walk-around motion. Extracts 81 raw 1920x1080 frames for local
# stabilization. Runs on a GitHub runner (can reach fal).
on:
  workflow_dispatch:
    inputs:
      model:       { description: 'fal Kling model id', default: 'fal-ai/kling-video/v2.1/pro/image-to-video' }
      duration:    { description: 'Video seconds (5 or 10)', default: '5' }
      frames:      { description: 'Frames to extract', default: '81' }
      expo:        { description: 'Exposure multiplier (lower = darker)', default: '0.90' }
      contrast:    { description: 'Contrast', default: '1.14' }
      sat:         { description: 'Saturation', default: '1.12' }
      prompt:      { description: 'Camera/scene prompt', default: 'Cinematic automotive commercial at golden hour. The red Porsche 911 slowly rotates in place on a turntable while the camera stays locked on a tripod at fixed height and distance. The car remains perfectly centered and the same size in frame. Smooth continuous constant-speed rotation revealing the front three-quarter. Warm golden sunset light, rich reflections on the paint, the car keeps its exact shape.' }
      negative:    { description: 'Negative prompt', default: 'camera shake, handheld, bobbing, walking around, zooming, car driving away, changing size, drifting off center, distortion, morphing, warping, melting, extra wheels, people, text, watermark, jerky motion' }
      cfg:         { description: 'CFG scale 0..1', default: '0.5' }
      out_branch:  { description: 'Branch to push raw frames to', default: 'hero/golden-out' }

permissions:
  contents: write

jobs:
  golden:
    runs-on: ubuntu-latest
    env:
      FAL_KEY: ${{ secrets.FAL_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          pip install --quiet pillow numpy
          sudo apt-get -qq update && sudo apt-get -qq install -y ffmpeg jpegoptim imagemagick

      - name: Grade source + publish it
        env:
          EXPO:     ${{ inputs.expo }}
          CONTRAST: ${{ inputs.contrast }}
          SAT:      ${{ inputs.sat }}
        run: |
          python3 - <<'PY'
          import numpy as np, os
          from PIL import Image, ImageFilter
          src="samsung-frame-tv-image (1).png"
          im=Image.open(src).convert("RGB")
          a=np.asarray(im).astype(np.float32)/255.0
          expo=float(os.environ["EXPO"]); contrast=float(os.environ["CONTRAST"]); sat=float(os.environ["SAT"])
          warm,coolB,lift,vig=1.05,0.96,-0.01,0.14
          x=a*expo
          x[:,:,0]=np.clip(x[:,:,0]*warm,0,1); x[:,:,2]=np.clip(x[:,:,2]*coolB,0,1)
          x=np.clip((x-0.5)*contrast+0.5+lift,0,1)
          luma=(0.299*x[:,:,0]+0.587*x[:,:,1]+0.114*x[:,:,2])[:,:,None]
          x=np.clip(luma+(x-luma)*sat,0,1)
          h,w=x.shape[:2]; yy,xx=np.mgrid[0:h,0:w]
          d=np.sqrt(((xx-w/2)/(w/2))**2+((yy-h/2)/(h/2))**2)
          x*=np.clip(1-vig*np.clip(d-0.5,0,1)*2,0,1)[:,:,None]
          out=Image.fromarray((np.clip(x,0,1)*255).astype(np.uint8))
          out=out.filter(ImageFilter.UnsharpMask(radius=2.2, percent=90, threshold=2))
          out.save("hero-golden-src.jpg", quality=94)
          print("graded source written", out.size)
          PY
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git checkout -B hero/golden-src
          git add hero-golden-src.jpg
          git commit -m "Graded golden-hour orbit source"
          git push -f origin hero/golden-src
          echo "SRC_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Generate turntable video via Kling
        env:
          MODEL:    ${{ inputs.model }}
          DURATION: ${{ inputs.duration }}
          PROMPT:   ${{ inputs.prompt }}
          NEG:      ${{ inputs.negative }}
          CFG:      ${{ inputs.cfg }}
        run: |
          python3 - <<'PY'
          import os, json, time, sys, urllib.request
          KEY=os.environ["FAL_KEY"]
          if not KEY: sys.exit("FAL_API_KEY secret is empty")
          REPO=os.environ["GITHUB_REPOSITORY"]; SRC_SHA=os.environ["SRC_SHA"]
          MODEL=os.environ["MODEL"].strip()
          img_url=f"https://raw.githubusercontent.com/{REPO}/{SRC_SHA}/hero-golden-src.jpg"
          print("source still:", img_url)
          hdr={"Authorization":f"Key {KEY}","Content-Type":"application/json"}
          def req(url, data=None):
              r=urllib.request.Request(url, data=(json.dumps(data).encode() if data is not None else None),
                                       headers=hdr, method=("POST" if data is not None else "GET"))
              with urllib.request.urlopen(r, timeout=120) as resp: return json.load(resp)
          # make sure the raw source is fetchable before handing the URL to fal
          for _ in range(10):
              try:
                  urllib.request.urlopen(urllib.request.Request(img_url), timeout=30).read(1); break
              except Exception as e:
                  print("waiting for raw source...", str(e)[:80], flush=True); time.sleep(5)
          body={"prompt":os.environ["PROMPT"],"image_url":img_url,"duration":os.environ["DURATION"],
                "aspect_ratio":"16:9","negative_prompt":os.environ["NEG"],"cfg_scale":float(os.environ["CFG"])}
          sub=req(f"https://queue.fal.run/{MODEL}", body)
          status_url=sub.get("status_url"); resp_url=sub.get("response_url")
          print("queued:", sub.get("request_id"), flush=True)
          for t in range(180):
              st=req(status_url); s=st.get("status")
              if s=="COMPLETED": break
              if s in ("FAILED","ERROR"): sys.exit(f"kling failed: {json.dumps(st)[:400]}")
              if t%6==0: print(f"  ...{s} ({t*5}s)",flush=True)
              time.sleep(5)
          else: sys.exit("timed out waiting for kling")
          out=req(resp_url); vurl=out["video"]["url"]; print("video:", vurl, flush=True)
          with urllib.request.urlopen(vurl, timeout=180) as v: open("orbit.mp4","wb").write(v.read())
          print("downloaded", os.path.getsize("orbit.mp4")//1024, "KB")
          PY

      - name: Extract 81 raw frames
        env:
          FRAMES: ${{ inputs.frames }}
        run: |
          rm -rf all_frames frames_new && mkdir -p all_frames frames_new
          ffmpeg -v error -i orbit.mp4 -vf "scale=1920:1080:flags=lanczos" -q:v 2 all_frames/f_%04d.jpg
          python3 - <<'PY'
          import glob, os, shutil
          N=int(os.environ["FRAMES"]); allf=sorted(glob.glob("all_frames/f_*.jpg"))
          if not allf: raise SystemExit("no frames extracted")
          M=len(allf); print(f"extracted {M} raw, sampling {N}")
          idx=[round(i*(M-1)/(N-1)) for i in range(N)] if N>1 else [0]
          for oi,si in enumerate(idx,1): shutil.copy(allf[si], f"frames_new/frame_{oi:03d}.jpg")
          PY
          jpegoptim -q -m92 --strip-all frames_new/*.jpg
          montage $(ls frames_new/frame_*.jpg | awk 'NR%10==1' | head -9) \
            -tile 3x3 -geometry 400x225+3+3 -background '#120a0a' contact_sheet.jpg || true

      - name: Push raw frames to review branch
        env:
          OUT: ${{ inputs.out_branch }}
        run: |
          git checkout -B "$OUT"
          rm -rf frames_golden && mv frames_new frames_golden
          cp contact_sheet.jpg frames_golden/_contact_sheet.jpg || true
          cp hero-golden-src.jpg frames_golden/_source.jpg || true
          git add frames_golden
          git commit -m "Golden turntable raw frames @1920x1080 (${{ inputs.model }})"
          git push -f origin "$OUT"
          echo "Pushed to $OUT"
